<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self' https://accounts.google.com https://cdnjs.cloudflare.com 'unsafe-inline';
                 style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com 'unsafe-inline';
                 font-src https://fonts.gstatic.com https://cdnjs.cloudflare.com;
                 connect-src 'self' https://flask-hello-world-nu-sooty-63.vercel.app https://accounts.google.com https://www.googleapis.com;
                 img-src 'self' https: data:;">
  <title>Quantum Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Agbalumo&family=Faster+One&family=Luckiest+Guy&family=Rubik+Marker+Hatch&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #c3caff 0%, #e2e5ff 40%, #ffffff 100%);
      font-family: 'Space Grotesk', sans-serif;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 10px;
    }

    .app-container {
      width: 100%;
      max-width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 140px;
    }

    .preview-image {
      width: 100vw;
      max-width: 100vw;
      height: auto;
      max-height: 180vh;
      object-fit: contain;
      border-radius: 20px;
      margin-top: 10px;
      display: block;
      transform: scale(1.15);
      transform-origin: center top;
    }

    .promo-text {
      margin-top: 20px;
      color: #1E293B;
      font-family: 'Luckiest Guy', cursive;
      font-size: 38px;
      font-weight: 400;
      letter-spacing: 2px;
      padding: 0 20px;
      line-height: 1.15;
      text-transform: uppercase;
    }

    .action-cards-container {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 500px;
      margin: 25px auto 10px auto;
      padding: 0 15px;
    }

    .action-card {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 24px;
      text-decoration: none;
      text-align: left;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
      transition: transform 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .action-card:active {
      transform: scale(0.96);
    }

    .card-join {
      background: linear-gradient(135deg, #e6e9ff 0%, #f1f3ff 100%);
      border: 1.5px solid #cbd2f6;
    }

    .card-support {
      background: linear-gradient(135deg, #f5f6f8 0%, #ffffff 100%);
      border: 1.5px solid #e2e8f0;
    }

    .card-icon {
      color: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-content {
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #000000;
      line-height: 1.2;
    }

    .card-subtitle {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: #64748B;
      margin-top: 1px;
      white-space: nowrap;
    }

    #loginView {
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 100;
    }

    .sub-btn {
      position: relative;
      width: 300px;
      height: 50px;
      border-radius: 50px;
      background: linear-gradient(90deg, #7C5CFC 0%, #c4b5fd 100%);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 8px 30px rgba(124, 92, 252, 0.45);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      animation: btnAppear 0.6s 0.3s both ease-out;
    }

    @keyframes btnAppear {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .sub-btn:active {
      transform: scale(0.96);
      box-shadow: 0 4px 16px rgba(124, 92, 252, 0.35);
    }

    .sub-btn .crown-icon {
      font-size: 22px;
      line-height: 1;
    }

    .sub-btn .btn-label {
      color: #ffffff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .error-msg { margin-top: 14px; font-size: 13px; color: #DC2626; text-align: center; font-weight: 500; display: none; }

    .profile-view {
      display: none;
      flex-direction: column;
      align-items: center;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 24px;
      padding: 40px 60px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
      position: fixed;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 101;
      width: 90%;
      max-width: 360px;
      animation: fade-up 0.5s ease-out both;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translate(-50%, 20px); }
      to { opacity: 1; transform: translate(-50%, 0); }
    }

    .user-avatar { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; margin-bottom: 16px; border: 2px solid rgba(0,0,0,0.1); }
    .status-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #00838F; background: rgba(0, 131, 143, 0.08); border: 1px solid rgba(0, 131, 143, 0.2); border-radius: 20px; padding: 4px 12px; margin-bottom: 12px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #00838F; box-shadow: 0 0 6px #00838F; animation: blink 1.5s ease-in-out infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .user-name { font-size: 20px; font-weight: 700; color: #1E293B; margin-bottom: 4px; }
    .user-email { font-size: 14px; color: rgba(0, 0, 0, 0.6); margin-bottom: 50px; }
    .btn-logout { width: 100%; height: 46px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.25); border-radius: 14px; color: #DC2626; font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .btn-logout:hover { background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.5); color: #B91C1C; }

    @media (max-width: 400px) {
      .card-title { font-size: 14px; }
      .card-subtitle { font-size: 10px; }
      .action-card { padding: 10px 12px; }
    }
  </style>
</head>
<body>

  <canvas id="particleCanvas" style="display: none;"></canvas>

  <div class="app-container">
    <img src="https://i.ibb.co/WNpTL7B6/1000073601.png" alt="UI Preview" class="preview-image"/>
    <h2 class="promo-text">MAKE YOUR LIFE EASY WITH DRAGO PREDICTOR</h2>
    
    <div class="action-cards-container">
      <a href="https://t.me/+t_giD22Lulk0NmE1" target="_blank" class="action-card card-join">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" width="34" height="34" fill="currentColor">
            <path d="M21.5 2.5L2 11.5l7.5 3.5 3.5 7.5 8.5-20z M9.5 15l1.5 4 1-3.5L19 5.5 9.5 15z"/>
          </svg>
        </div>
        <div class="card-content">
          <span class="card-title">Join Channel</span>
          <span class="card-subtitle">• Get latest updates!</span>
        </div>
      </a>
      
      <a href="https://t.me/xx_drago" target="_blank" class="action-card card-support">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" width="34" height="34" fill="currentColor">
            <path d="M12 2A10 10 0 0 0 2 12v4a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2H4a8 8 0 0 1 16 0h-2a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2v-4A10 10 0 0 0 12 2z"/>
            <path d="M6 18c0 2.5 2 4 4.5 4h1v-1.5h-1C8.5 20.5 7.5 19.5 7.4 18Z"/>
          </svg>
        </div>
        <div class="card-content">
          <span class="card-title">Customer &<br>Support</span>
          <span class="card-subtitle">• We are here to help!</span>
        </div>
      </a>
    </div>
  </div>

  <div id="loginView">
    <button id="googleLoginBtn" class="sub-btn" type="button">
      <span class="btn-label">✦ Get Started ✦</span>
    </button>
    
    <div id="errorMsg" class="error-msg"></div>
  </div>

  <div id="profileView" class="profile-view">
    <img id="userAvatar" src="" alt="avatar" class="user-avatar"/>
    <div class="status-badge">
      <span class="status-dot"></span>
      Access Authorized
    </div>
    <div class="user-name" id="userName">--</div>
    <div class="user-email" id="userEmail">--</div>
    <button class="btn-logout" id="logoutBtn" type="button">Sign Out</button>
  </div>

  <script>
    const API_BASE_URL    = "https://flask-hello-world-nu-sooty-63.vercel.app";
    const GOOGLE_CLIENT_ID = "1066810347341-9jc6gt17evnbv09di21eq95d42itv49a.apps.googleusercontent.com";

    let session = { user: null, signature: null };

    const loginView      = document.getElementById("loginView");
    const profileView    = document.getElementById("profileView");
    const googleLoginBtn = document.getElementById("googleLoginBtn");
    const logoutBtn      = document.getElementById("logoutBtn");
    const errorMsg       = document.getElementById("errorMsg");
    const userAvatar     = document.getElementById("userAvatar");
    const userName       = document.getElementById("userName");
    const userEmail      = document.getElementById("userEmail");

    (function(){
      const canvas = document.getElementById("particleCanvas");
      const ctx    = canvas.getContext("2d");
      let W, H, pts = [];
      const COLS = ["#00E5FF","#7C3AED","#22D3EE","#A78BFA"];
      function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
      function mkp(){
        return { x:Math.random()*W, y:H+10, r:Math.random()*2+0.5,
                 speed:Math.random()*0.6+0.3, drift:(Math.random()-0.5)*1.5,
                 color:COLS[Math.floor(Math.random()*COLS.length)],
                 alpha:0, life:0, maxLife:Math.random()*200+150 };
      }
      function tick(){
        ctx.clearRect(0,0,W,H);
        if(pts.length < 45) pts.push(mkp());
        pts = pts.filter(p => p.life < p.maxLife);
        pts.forEach(p => {
          p.life++; p.y -= p.speed; p.x += p.drift*0.3;
          p.alpha = p.life < 30 ? p.life/30 : p.life > p.maxLife-30 ? (p.maxLife-p.life)/30 : 0.7;
          ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
          ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha*0.6; ctx.fill();
          const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*2.5);
          g.addColorStop(0,p.color+"55"); g.addColorStop(1,p.color+"00");
          ctx.beginPath(); ctx.arc(p.x,p.y,p.r*2.5,0,Math.PI*2);
          ctx.fillStyle=g; ctx.globalAlpha=p.alpha*0.3; ctx.fill();
          ctx.globalAlpha=1;
        });
        requestAnimationFrame(tick);
      }
      window.addEventListener("resize", resize);
      resize(); tick();
    })();

    let tokenClient;
    function initGoogle(){
      if(typeof google==="undefined"){setTimeout(initGoogle,100);return;}
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: "https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email",
        callback: async (res) => { if(res?.access_token) await handleLogin(res.access_token); }
      });
    }
    window.addEventListener("load", initGoogle);

    function showError(m){ errorMsg.style.display="block"; errorMsg.textContent=m; }
    function hideError(){ errorMsg.style.display="none"; errorMsg.textContent=""; }

    function renderLoggedIn(user){
      loginView.style.display   = "none";
      profileView.style.display = "flex";
      userName.textContent  = user.name  || "Quantum User";
      userEmail.textContent = user.email || "";
      userAvatar.src = (user.picture && user.picture.startsWith("https://"))
        ? user.picture
        : "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
    }
    function renderLoggedOut(){ profileView.style.display="none"; loginView.style.display="flex"; }

    async function handleLogin(accessToken){
      googleLoginBtn.disabled = true; hideError();
      try {
        const res  = await fetch(`${API_BASE_URL}/api/auth`,{
          method:"POST", headers:{"Content-Type":"application/json"},
          body:JSON.stringify({access_token:accessToken})
        });
        if(!res.ok) throw new Error();
        const data = await res.json();
        if(data.status==="success" && data.user){
          session = { user:data.user, signature:data.session_signature };
          // Payment.html ke liye user data save karo
          sessionStorage.setItem("qUser", JSON.stringify(data.user));
          sessionStorage.setItem("qSig", data.session_signature);
          renderLoggedIn(data.user);
          // 800ms baad Payment.html pe redirect
          setTimeout(() => { window.location.href = "Payment.html"; }, 800);
        } else throw new Error();
      } catch { showError("Authentication failed. Please try again."); }
      finally { googleLoginBtn.disabled = false; }
    }

    googleLoginBtn.addEventListener("click", () => {
      hideError();
      if(!tokenClient){ showError("Google services loading. Please wait."); return; }
      googleLoginBtn.disabled = true;
      tokenClient.requestAccessToken();
    });

    logoutBtn.addEventListener("click", () => {
      session = {user:null,signature:null};
      if(typeof google!=="undefined") google.accounts.oauth2.revoke();
      renderLoggedOut();
    });
  </script>
</body>
</html>
