<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quantum Analyzer - Auth</title>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <!-- Modern Google Sign-In SDK (Zero Firebase details required in frontend) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 50% 30%, #1a0b36 0%, #0d051d 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 400px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 24px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 50px rgba(139, 92, 246, 0.1);
      backdrop-filter: blur(10px);
    }

    .logo-area {
      margin-bottom: 30px;
    }

    .logo-icon {
      font-size: 50px;
      color: #a78bfa;
      text-shadow: 0 0 20px rgba(167, 139, 250, 0.5);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 1.5px;
      color: #fff;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 35px;
      letter-spacing: 0.5px;
    }

    /* Login Button Style */
    .login-btn {
      width: 100%;
      padding: 14px 20px;
      background: #fff;
      color: #111827;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 255, 255, 0.15);
      background: #f9fafb;
    }

    .login-btn i {
      font-size: 18px;
    }

    /* Active User View */
    .profile-card {
      display: none;
      flex-direction: column;
      align-items: center;
    }

    .avatar-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    .avatar-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #a78bfa;
      border-bottom-color: #8b5cf6;
      animation: rotate 3s linear infinite;
    }

    @keyframes rotate {
      100% { transform: rotate(360deg); }
    }

    .user-avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #0d051d;
      position: relative;
      z-index: 2;
    }

    .user-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .user-email {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 30px;
    }

    .logout-btn {
      width: 100%;
      padding: 12px 20px;
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    .hidden {
      display: none !important;
    }

    .error-msg {
      color: #ef4444;
      font-size: 12px;
      margin-top: 15px;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo-area">
      <i class="fa-solid fa-atom logo-icon"></i>
    </div>
    <h1 class="title">QUANTUM ANALYZER</h1>
    <p class="subtitle" id="statusText">Aapka account authorize karein</p>

    <!-- State 1: Sign-In View -->
    <div id="loggedOutView">
      <button class="login-btn" id="googleLoginBtn">
        <i class="fa-brands fa-google" style="color: #4285F4;"></i>
        Sign in with Google
      </button>
    </div>

    <!-- State 2: Active User View -->
    <div id="loggedInView" class="profile-card">
      <div class="avatar-wrapper">
        <div class="avatar-ring"></div>
        <img id="userAvatar" src="" alt="User Avatar" class="user-avatar" />
      </div>
      <div class="user-name" id="userName">--</div>
      <div class="user-email" id="userEmail">--</div>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

    <!-- System Status/Errors -->
    <div id="errorBox" class="error-msg hidden"></div>
  </div>

  <script type="module">
    // Vercel Bridge API endpoint (No trailing slash)
    const API_BASE_URL = "https://quantumpredictor-zeta.vercel.app";
    
    // Configured Google OAuth Web Client ID
    const GOOGLE_CLIENT_ID = "1066810347341-9jc6gt17evnbv09di21eq95d42itv49a.apps.googleusercontent.com";

    // DOM Elements
    const googleLoginBtn = document.getElementById("googleLoginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const loggedOutView = document.getElementById("loggedOutView");
    const loggedInView = document.getElementById("loggedInView");
    const userAvatar = document.getElementById("userAvatar");
    const userName = document.getElementById("userName");
    const userEmail = document.getElementById("userEmail");
    const statusText = document.getElementById("statusText");
    const errorBox = document.getElementById("errorBox");

    let googleTokenClient;

    // Initialize modern Google Identity Service SDK
    function initGoogleAuth() {
      if (typeof google === 'undefined') {
        setTimeout(initGoogleAuth, 100);
        return;
      }

      googleTokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: "https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email",
        callback: async (tokenResponse) => {
          if (tokenResponse && tokenResponse.access_token) {
            await handleBackendLogin(tokenResponse.access_token);
          }
        },
      });
    }

    // Trigger initialization when script loads
    window.addEventListener('load', initGoogleAuth);

    // Dynamic UI state toggle
    function updateUI(user) {
      errorBox.classList.add("hidden");
      if (user) {
        loggedOutView.classList.add("hidden");
        loggedInView.style.display = "flex";
        statusText.innerText = "ACCESS AUTHORIZED";
        userName.innerText = user.name || "Quantum User";
        userEmail.innerText = user.email || "";
        userAvatar.src = user.picture || "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
      } else {
        loggedInView.style.display = "none";
        loggedOutView.classList.remove("hidden");
        statusText.innerText = "Aapka account authorize karein";
      }
    }

    // Secure Login function that calls Vercel API
    async function handleBackendLogin(accessToken) {
      try {
        statusText.innerText = "Authenticating with Quantum secure server...";
        
        const response = await fetch(`${API_BASE_URL}/api/auth`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ access_token: accessToken })
        });

        if (!response.ok) {
          throw new Error("Bridge security validation failed.");
        }

        const data = await response.json();
        
        if (data.status === "success" && data.user) {
          // Cryptographic session signature save karein storage me.
          localStorage.setItem("quantum_user", JSON.stringify(data.user));
          localStorage.setItem("session_signature", data.session_signature);
          updateUI(data.user);
        } else {
          throw new Error("Session payload structure validation failed.");
        }
      } catch (error) {
        console.error("Auth Server Connection Error:", error);
        errorBox.classList.remove("hidden");
        errorBox.innerText = "Security node rejected your handshake. Verify parameters.";
        updateUI(null);
      }
    }

    // Google custom button click trigger
    googleLoginBtn.addEventListener("click", () => {
      errorBox.classList.add("hidden");
      if (!googleTokenClient) {
        errorBox.classList.remove("hidden");
        errorBox.innerText = "Google API integration starting up. Try again in 2 seconds.";
        return;
      }
      googleTokenClient.requestAccessToken();
    });

    // Simple Logout
    logoutBtn.addEventListener("click", () => {
      localStorage.removeItem("quantum_user");
      localStorage.removeItem("session_signature");
      updateUI(null);
    });

    // Check existing login on page reload
    const storedUser = localStorage.getItem("quantum_user");
    if (storedUser) {
      updateUI(JSON.parse(storedUser));
    }
  </script>
</body>
</html>
