<!DOCTYPE html>
<html lang="en">
<head>
    <!-- ... (Baki ka code same rahega) ... -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Slider</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: linear-gradient(180deg, #dce2ff 0%, #ffffff 100%); font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; }
        .content-box { width: 95%; max-width: 460px; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .logo { width: 120px; height: auto; margin-bottom: 10px; }
        .plan-title { font-size: 26px; font-weight: 900; color: #8B5CF6; margin-bottom: 10px; }
        .plan-desc { font-size: 13px; color: #6b7280; text-align: center; margin-bottom: 20px; line-height: 1.4; }

        .swiper { width: 100%; padding: 20px 0; }
        .card { background: #f3f4f6; border-radius: 25px; padding: 15px 20px; width: 100%; border: 2px solid #ffffff; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .price-main { font-weight: 900; font-size: 18px; color: #8B5CF6; }
        .discount-text { font-size: 10px; font-weight: 800; color: #333; }
        .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .feature-item { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 1000; color: #4b5563; }
        .feature-item img { width: 25px; height: 25px; }
        
        .btn { background: linear-gradient(135deg, #7C3AED 0%, #5B6AF0 100%); color: #ffffff; border: none; padding: 16px; border-radius: 15px; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 20px; width: 100%; box-shadow: 0 5px 15px rgba(124, 58, 237, 0.4); }

        /* ── Profile Banner — clean, no background ── */
        #profileBanner {
            position: fixed;
            top: 16px;
            left: 14px;
            display: flex;
            align-items: center;
            gap: 9px;
            z-index: 999;
            animation: bannerSlide 0.5s ease-out both;
        }
        @keyframes bannerSlide {
            from { opacity: 0; transform: translateX(-20px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        #avatarWrap img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }
        .avatar-fallback {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #7C3AED, #5B6AF0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            color: #fff;
        }
        #profileBanner .profile-info {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }
        #profileBanner .welcome-text {
            font-size: 10px;
            font-weight: 600;
            color: #777;
        }
        #profileBanner .user-name {
            font-size: 14px;
            font-weight: 900;
            color: #1a1a2e;
            text-transform: uppercase;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<!-- Profile Banner — top left, no background -->
<div id="profileBanner" style="display:none;">
    <div id="avatarWrap"></div>
    <div class="profile-info">
        <span class="welcome-text">Welcome,</span>
        <span class="user-name" id="bannerName">User</span>
    </div>
</div>

<div class="content-box">
    <img src="https://i.ibb.co/Cp6rPPxp/20260218-115056.png" class="logo">
    <p class="plan-title">Select Your Plan</p>
    <p class="plan-desc">Subscribe today and unlock powerful tools, real-time insights, and premium support to help you trade smarter every day.</p>
    
    <div class="swiper">
        <div class="swiper-wrapper" id="slider-content"></div>
    </div>
    
    <button class="btn">Continue</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const plans = [
        { p: "FREE", d: "", f: ["Limited Resources", "Inbuild Platform", "1 Script"] },
        { p: "299 ₹", d: "3 Days", f: ["ADVANCE AI", "DAILY SCRIPT", "BEST SERVER", "24x7 SUPPORT", "AD FREE", "ALL GAME SUPPORTED"] },
        { p: "349 ₹", d: "3 Days +", f: ["ADVANCE AI", "DAILY SCRIPT", "BEST SERVER", "24x7 SUPPORT", "AD FREE", "ALL GAME SUPPORTED"] },
        { p: "549 ₹", d: "7 Days", f: ["ADVANCE AI", "DAILY SCRIPT", "BEST SERVER", "24x7 SUPPORT", "AD FREE", "ALL GAME SUPPORTED"] },
        { p: "600 ₹", d: "7 Days +", f: ["ADVANCE AI", "DAILY SCRIPT", "BEST SERVER", "24x7 SUPPORT", "AD FREE", "ALL GAME SUPPORTED"] },
        { p: "999 ₹", d: "15 Days", f: ["ADVANCE AI", "DAILY SCRIPT", "BEST SERVER", "24x7 SUPPORT", "AD FREE", "ALL GAME SUPPORTED"] },
        { p: "1111 ₹", d: "15 Days +", f: ["ADVANCE AI", "DAILY SCRIPT", "BEST SERVER", "24x7 SUPPORT", "AD FREE", "ALL GAME SUPPORTED"] },
        { p: "1999 ₹", d: "30 Days +", f: ["ADVANCE AI", "DAILY SCRIPT", "BEST SERVER", "24x7 SUPPORT", "AD FREE", "ALL GAME SUPPORTED"] }
    ];

    const container = document.getElementById('slider-content');
    plans.forEach(plan => {
        container.innerHTML += `
            <div class="swiper-slide">
                <div class="card">
                    <div class="header-row">
                        <div class="price-main">${plan.p} ${plan.d}</div>
                        <div class="discount-text">${plan.p === 'FREE' ? '' : '15% off'}</div>
                    </div>
                    <div class="features-grid">
                        ${plan.f.map(item => `
                            <div class="feature-item">
                                <img src="https://i.ibb.co/99rjSgLp/20260613-092804.png"> ${item}
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
    });

    const swiper = new Swiper('.swiper', {
        loop: true,
        centeredSlides: true,
        slidesPerView: 1.1,
        spaceBetween: 10,
        autoplay: {
            delay: 500,
            disableOnInteraction: false,
        },
        speed: 1000,
    });

    setTimeout(() => {
        swiper.autoplay.stop();
    }, 2000);

    // ── Profile Banner ──
    (function () {
        try {
            const ud = JSON.parse(localStorage.getItem("_ud") || "null");
            if (!ud || !ud.name) return;

            const banner   = document.getElementById("profileBanner");
            const nameEl   = document.getElementById("bannerName");
            const avatarEl = document.getElementById("avatarWrap");

            // Sirf naam dikhao — email nahi, sirf name field
            nameEl.textContent = ud.name;

            // Real Google profile photo
            if (ud.picture) {
                const img = document.createElement("img");
                img.src = ud.picture;
                img.alt = ud.name;
                img.onerror = function () {
                    this.remove();
                    const div = document.createElement("div");
                    div.className = "avatar-fallback";
                    div.textContent = ud.name.charAt(0).toUpperCase();
                    avatarEl.appendChild(div);
                };
                avatarEl.appendChild(img);
            } else {
                const div = document.createElement("div");
                div.className = "avatar-fallback";
                div.textContent = ud.name.charAt(0).toUpperCase();
                avatarEl.appendChild(div);
            }

            banner.style.display = "flex";
        } catch (e) {}
    })();
</script>
</body>
</html>
